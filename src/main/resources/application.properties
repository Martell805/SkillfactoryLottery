# JWT
mp.jwt.verify.issuer=vovandiya
mp.jwt.verify.publickey.location=rsa/publicKey.pem
smallrye.jwt.sign.key.location=rsa/privateKey.pem

# Dev Services
quarkus.devservices.enabled=false

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=user
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/sflottery
quarkus.datasource.devservices.enabled=false

# Hibernate
quarkus.hibernate-orm.database.generation=update

# Test profile
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/sflottery_test
%test.quarkus.hibernate-orm.database.generation=drop-and-create